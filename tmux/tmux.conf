set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g status-position top

set-option -g default-shell "/opt/homebrew/bin/nu"

set -g set-titles off
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "omerxx/tmux-sessionx"
set -g @plugin "catppuccin/tmux#v2.3.0"
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'omerxx/tmux-floax'

# Catppuccin: all @catppuccin_* options must be set before TPM loads the theme.
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "#{@thm_bg}"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @sessionx-bind "o"
set -g @sessionx-prefix "on"
set -g @sessionx-fzf-builtin-tmux "on"
set -g @sessionx-window-height "85%"
set -g @sessionx-window-width "75%"
set -g @sessionx-preview-location "right"
set -g @sessionx-preview-ratio "55%"
set -g @sessionx-zoxide-mode "on"
set -g @sessionx-x-path "~/dotfiles"
set -g @sessionx-custom-paths "~/dotfiles"
set -g @sessionx-custom-paths-subdirectories "true"

run "~/.config/tmux/plugins/tpm/tpm"

set -g status-justify left
set -g status-right-length 200
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"

run-shell "~/.config/tmux/plugins/tmux-cpu/cpu.tmux"
